version: '3.8'

name: sonixy

services:
  # Email Service
  email-service:
    build:
      context: .
      dockerfile: Sonixy.EmailService/Dockerfile
    container_name: sonixy-email
    restart: always
    environment:
      - DOTNET_ENVIRONMENT=Development
      - RabbitMQ__Host=rabbitmq
      - RabbitMQ__Username=${RABBITMQ_USER:-guest}
      - RabbitMQ__Password=${RABBITMQ_PASS:-guest}
      - Smtp__Host=${SMTP_HOST}
      - Smtp__Port=${SMTP_PORT}
      - Smtp__Username=${SMTP_USERNAME}
      - Smtp__Password=${SMTP_PASSWORD}
      - FrontendUrl=https://sonixy.nhatcuong.io.vn
    networks:
      - sonixy-network
      - tools_network

  # Identity Service
  identity-service:
    build:
      context: .
      dockerfile: Sonixy.IdentityService/Dockerfile
    container_name: sonixy-identity
    restart: always
    ports:
      - "5008:8088"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8088
      - CORS__AllowOrigins=https://sonixy.nhatcuong.io.vn
      - MongoDB__ConnectionString=mongodb://admin:${MONGO_PASSWORD:-SonixyAdmin123!}@mongodb:27017
      - MongoDB__DatabaseName=sonixy_identity
      - Jwt__SecretKey=${JWT_SECRET:-YourSuperSecretKeyThatIsAtLeast32CharactersLongForHS256}
      - Jwt__Issuer=Sonixy.IdentityService
      - Jwt__Audience=Sonixy.Client
      - RabbitMQ__Host=rabbitmq
      - RabbitMQ__Username=${RABBITMQ_USER:-guest}
      - RabbitMQ__Password=${RABBITMQ_PASS:-guest}
    networks:
      - sonixy-network
      - database_network
      - tools_network
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:5008/health" ]
      interval: 30s
      timeout: 10s
      retries: 3

  # User Service
  user-service:
    build:
      context: .
      dockerfile: Sonixy.UserService/Dockerfile
    container_name: sonixy-user
    restart: always
    ports:
      - "5009:8089"
      - "5109:8189"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8089;http://+:8189
      - CORS__AllowOrigins=https://sonixy.nhatcuong.io.vn
      - MongoDB__ConnectionString=mongodb://admin:${MONGO_PASSWORD:-SonixyAdmin123!}@mongodb:27017
      - MongoDB__DatabaseName=sonixy_users
      - Jwt__SecretKey=${JWT_SECRET:-YourSuperSecretKeyThatIsAtLeast32CharactersLongForHS256}
      - Jwt__Issuer=Sonixy.IdentityService
      - Jwt__Audience=Sonixy.Client
      - Minio__Endpoint=tools-minio:9000
      - Minio__AccessKey=${MINIO_ROOT_USER:-admin}
      - Minio__SecretKey=${MINIO_ROOT_PASSWORD:-SonixyMinio123!}
      - Minio__Bucket=sonixy-users
      - Minio__PublicUrl=https://media-sonixy.nhatcuong.io.vn
    networks:
      - sonixy-network
      - database_network
      - tools_network

  # Post Service
  post-service:
    build:
      context: .
      dockerfile: Sonixy.PostService/Dockerfile
    container_name: sonixy-post
    restart: always
    ports:
      - "5010:8090"
      - "5110:8190"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8090;http://+:8190
      - CORS__AllowOrigins=https://sonixy.nhatcuong.io.vn
      - MongoDB__ConnectionString=mongodb://admin:${MONGO_PASSWORD:-SonixyAdmin123!}@mongodb:27017
      - MongoDB__DatabaseName=sonixy_posts
      - Minio__Endpoint=tools-minio:9000
      - Minio__AccessKey=${MINIO_ROOT_USER:-admin}
      - Minio__SecretKey=${MINIO_ROOT_PASSWORD:-SonixyMinio123!}
      - Minio__PublicUrl=https://media-sonixy.nhatcuong.io.vn
      - Jwt__SecretKey=${JWT_SECRET:-YourSuperSecretKeyThatIsAtLeast32CharactersLongForHS256}
      - Jwt__Issuer=Sonixy.IdentityService
      - Jwt__Audience=Sonixy.Client
      - RabbitMQ__Host=rabbitmq
      - RabbitMQ__Username=${RABBITMQ_USER:-guest}
      - RabbitMQ__Password=${RABBITMQ_PASS:-guest}
    volumes:
      - ./uploads:/app/wwwroot/uploads
    networks:
      - sonixy-network
      - database_network
      - tools_network

  # Social Graph Service
  social-service:
    build:
      context: .
      dockerfile: Sonixy.SocialGraphService/Dockerfile
    container_name: sonixy-social
    restart: always
    ports:
      - "5011:8091"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8091
      - CORS__AllowOrigins=https://sonixy.nhatcuong.io.vn
      - MongoDB__ConnectionString=mongodb://admin:${MONGO_PASSWORD:-SonixyAdmin123!}@mongodb:27017
      - MongoDB__DatabaseName=sonixy_social
      - Jwt__SecretKey=${JWT_SECRET:-YourSuperSecretKeyThatIsAtLeast32CharactersLongForHS256}
      - Jwt__Issuer=Sonixy.IdentityService
      - Jwt__Audience=Sonixy.Client
    networks:
      - sonixy-network
      - database_network
      - tools_network

  # Analytics Service
  analytics-service:
    build:
      context: .
      dockerfile: Sonixy.AnalyticsService/Dockerfile
    container_name: sonixy-analytics
    restart: always
    ports:
      - "5012:8092"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8092
      - CORS__AllowOrigins=https://sonixy.nhatcuong.io.vn
      - RabbitMQ__Host=rabbitmq
      - RabbitMQ__Username=${RABBITMQ_USER:-guest}
      - RabbitMQ__Password=${RABBITMQ_PASS:-guest}
      - MongoDB__ConnectionString=mongodb://admin:${MONGO_PASSWORD:-SonixyAdmin123!}@mongodb:27017
      - MongoDB__DatabaseName=sonixy_analytics
    networks:
      - sonixy-network
      - database_network
      - tools_network

  # Feed Service
  feed-service:
    build:
      context: .
      dockerfile: Sonixy.FeedService/Dockerfile
    container_name: sonixy-feed
    restart: always
    ports:
      - "5013:8093"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8093
      - CORS__AllowOrigins=https://sonixy.nhatcuong.io.vn
      - RabbitMQ__Host=rabbitmq
      - RabbitMQ__Username=${RABBITMQ_USER:-guest}
      - RabbitMQ__Password=${RABBITMQ_PASS:-guest}
      - Redis__ConnectionString=redis:6379
      - MongoDB__ConnectionString=mongodb://admin:${MONGO_PASSWORD:-SonixyAdmin123!}@mongodb:27017
      - MongoDB__DatabaseName=sonixy_feed
      - GrpcClients__PostService=http://post-service:8190
      - GrpcClients__SocialGraphService=http://social-service:8191
      - Jwt__SecretKey=${JWT_SECRET:-YourSuperSecretKeyThatIsAtLeast32CharactersLongForHS256}
      - Jwt__Issuer=Sonixy.IdentityService
      - Jwt__Audience=Sonixy.Client
    networks:
      - sonixy-network
      - database_network
      - tools_network

  # Notification Service
  notification-service:
    build:
      context: .
      dockerfile: Sonixy.NotificationService/Dockerfile
    container_name: sonixy-notification
    restart: always
    ports:
      - "5014:8094"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8094
      - CORS__AllowOrigins=https://sonixy.nhatcuong.io.vn
      - RabbitMQ__Host=rabbitmq
      - RabbitMQ__Username=${RABBITMQ_USER:-guest}
      - RabbitMQ__Password=${RABBITMQ_PASS:-guest}
      - MongoDB__ConnectionString=mongodb://admin:${MONGO_PASSWORD:-SonixyAdmin123!}@mongodb:27017
      - MongoDB__DatabaseName=sonixy_notifications
      - Jwt__SecretKey=${JWT_SECRET:-YourSuperSecretKeyThatIsAtLeast32CharactersLongForHS256}
      - Jwt__Issuer=Sonixy.IdentityService
      - Jwt__Audience=Sonixy.Client
    networks:
      - sonixy-network
      - database_network
      - tools_network

  # Chat Service
  chat-service:
    build:
      context: .
      dockerfile: Sonixy.ChatService/Dockerfile
    container_name: sonixy-chat
    restart: always
    ports:
      - "5015:8095"
      - "5195:8195"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8095;http://+:8195
      - CORS__AllowOrigins=https://sonixy.nhatcuong.io.vn
      - RabbitMQ__Host=rabbitmq
      - RabbitMQ__Username=${RABBITMQ_USER:-guest}
      - RabbitMQ__Password=${RABBITMQ_PASS:-guest}
      - Redis__ConnectionString=redis:6379
      - MongoDB__ConnectionString=mongodb://admin:${MONGO_PASSWORD:-SonixyAdmin123!}@mongodb:27017
      - MongoDB__DatabaseName=sonixy_chat
      - Jwt__SecretKey=${JWT_SECRET:-YourSuperSecretKeyThatIsAtLeast32CharactersLongForHS256}
      - Jwt__Issuer=Sonixy.IdentityService
      - Jwt__Audience=Sonixy.Client
    networks:
      - sonixy-network
      - database_network
      - tools_network

  # Search Service (Elasticsearch)
  search-service:
    build:
      context: .
      dockerfile: Sonixy.SearchService/Dockerfile
    container_name: sonixy-search
    restart: always
    ports:
      - "5016:8096"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8096
      - CORS__AllowOrigins=https://sonixy.nhatcuong.io.vn
      - Elasticsearch__Uri=http://elasticsearch:9200
      - RabbitMQ__Host=rabbitmq
      - RabbitMQ__Username=${RABBITMQ_USER:-guest}
      - RabbitMQ__Password=${RABBITMQ_PASS:-guest}
      - Jwt__SecretKey=${JWT_SECRET:-YourSuperSecretKeyThatIsAtLeast32CharactersLongForHS256}
      - Jwt__Issuer=Sonixy.IdentityService
      - Jwt__Audience=Sonixy.Client
    networks:
      - sonixy-network
      - tools_network

  # API Gateway
  gateway:
    build:
      context: .
      dockerfile: Sonixy.Gateway/Dockerfile
    container_name: sonixy-gateway
    restart: always
    ports:
      - "5100:8100"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8100
      - CORS__AllowOrigins=https://sonixy.nhatcuong.io.vn
      - Jwt__SecretKey=${JWT_SECRET:-YourSuperSecretKeyThatIsAtLeast32CharactersLongForHS256}
      - Jwt__Issuer=Sonixy.IdentityService
      - Jwt__Audience=Sonixy.Client
    depends_on:
      - identity-service
      - user-service
      - post-service
      - social-service
      - analytics-service
      - feed-service
      - notification-service
      - chat-service
      - search-service
    networks:
      - sonixy-network

  # Cloudflare Tunnel
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: sonixy-tunnel
    command: tunnel run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - gateway
    networks:
      - sonixy-network
      - tools_network
    mem_limit: 128m
    mem_reservation: 64m
    cpus: 0.25
    restart: unless-stopped
    # No ports exposed - tunnel handles everything

networks:
  sonixy-network:
    driver: bridge
  database_network:
    external: true
  tools_network:
    external: true
